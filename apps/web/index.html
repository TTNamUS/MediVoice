<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediVoice Smoke Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    main { max-width: 480px; text-align: center; }
    h1 { color: #38bdf8; font-size: 1.5rem; margin-bottom: 12px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 20px; }
    a {
      display: inline-block;
      border-radius: 8px;
      background: #0ea5e9;
      color: white;
      font-weight: 600;
      padding: 12px 24px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>MediVoice Smoke Test</h1>
    <p>
      Browser voice now uses the Next.js LiveKit WebRTC client. Start the web app
      and open the clinic route to test audio.
    </p>
    <a href="/clinic">Open clinic voice client</a>
  </main>

</html>
