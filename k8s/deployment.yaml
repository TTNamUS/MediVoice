apiVersion: apps/v1
kind: Deployment
metadata:
  name: medivoice-server
  namespace: medivoice
  labels:
    app.kubernetes.io/name: medivoice
    app.kubernetes.io/component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medivoice-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime: new pod must be ready before old is removed
  template:
    metadata:
      labels:
        app: medivoice-server
        app.kubernetes.io/name: medivoice
        app.kubernetes.io/component: server
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: medivoice-server
          image: ghcr.io/GITHUB_USER/medivoice-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: medivoice-config
            - secretRef:
                name: medivoice-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
