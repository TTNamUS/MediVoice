apiVersion: v1
kind: ConfigMap
metadata:
  name: medivoice-config
  namespace: medivoice
  labels:
    app.kubernetes.io/name: medivoice
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  OTEL_SERVICE_NAME: "medivoice-server"
  # OTel collector sidecar or in-cluster endpoint — override per environment
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4319"
  QDRANT_URL: "http://qdrant.medivoice.svc.cluster.local:6333"
  QDRANT_COLLECTION: "clinic_kb_v1"
  DATABASE_URL: "postgresql://medivoice:$(POSTGRES_PASSWORD)@postgres.medivoice.svc.cluster.local:5432/medivoice"
