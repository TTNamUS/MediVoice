services:
  # ── Qdrant (vector DB) ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: medivoice-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Postgres ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: medivoice-postgres
    environment:
      POSTGRES_USER: medivoice
      POSTGRES_PASSWORD: medivoice
      POSTGRES_DB: medivoice
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medivoice"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Jaeger (distributed tracing) ─────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: medivoice-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC (used by otel-collector)
      - "4318:4318"     # OTLP HTTP
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OpenTelemetry Collector ───────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: medivoice-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4319:4317"     # OTLP gRPC for app → collector (avoids conflict with Jaeger)
      - "8888:8888"     # Prometheus metrics (collector self-monitoring)
    depends_on:
      jaeger:
        condition: service_healthy

  # ── Prometheus (metrics scraping) ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: medivoice-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"   # Prometheus UI
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - otel-collector

  # ── Grafana (dashboards) ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: medivoice-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: medivoice
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3002:3000"   # Grafana UI (3000 taken by Next.js)
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Langfuse (LLM observability) — uses cloud by default; uncomment for self-host
  # langfuse-db:
  #   image: postgres:16-alpine
  #   container_name: medivoice-langfuse-db
  #   environment:
  #     POSTGRES_USER: langfuse
  #     POSTGRES_PASSWORD: langfuse
  #     POSTGRES_DB: langfuse
  #   volumes:
  #     - langfuse-db-data:/var/lib/postgresql/data
  #
  # langfuse:
  #   image: langfuse/langfuse:2
  #   container_name: medivoice-langfuse
  #   depends_on:
  #     - langfuse-db
  #   environment:
  #     DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
  #     NEXTAUTH_SECRET: medivoice-secret-change-me
  #     NEXTAUTH_URL: http://localhost:3001
  #     SALT: medivoice-salt
  #   ports:
  #     - "3001:3000"

volumes:
  qdrant-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  # langfuse-db-data:
