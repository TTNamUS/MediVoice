global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel collector self-monitoring metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # MediVoice app metrics (if we expose /metrics via prometheus_client)
  - job_name: medivoice
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
    scrape_interval: 30s
